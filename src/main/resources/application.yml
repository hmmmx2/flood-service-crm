spring:
  config:
    import: "optional:dotenv:.env"
  application:
    name: flood-service-crm

  datasource:
    # SPRING_DATASOURCE_URL takes priority — set this on Railway with the jdbc: prefix.
    # Falls back to DATABASE_URL for local dev (also needs jdbc: prefix).
    # Railway PostgreSQL plugin sets DATABASE_URL as "postgresql://..." — override it:
    #   Set SPRING_DATASOURCE_URL=jdbc:postgresql://HOST/DB?sslmode=require&user=U&password=P
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 30000
      # Neon PostgreSQL closes idle connections after ~5 minutes.
      # max-lifetime must be shorter than that so HikariCP retires connections
      # before Neon closes them, eliminating "connection has been closed" warnings.
      idle-timeout: 120000       # 2 min  — evict idle connections quickly
      max-lifetime: 240000       # 4 min  — retire connections before Neon's 5-min cutoff
      keepalive-time: 60000      # 1 min  — send a keepalive ping to hold active connections

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # TODO: Change to 'validate' or 'none' in production. Use Flyway/Liquibase for prod migrations.
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}   # Override: HIBERNATE_DDL_AUTO=validate in production
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      url: ${REDIS_URL:}      # Upstash URL e.g. rediss://default:token@host:6379
      # If REDIS_URL is empty, RedisConfig falls back to ConcurrentMapCache (local dev)

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}   # empty = dev mode, emails logged to console instead
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:4002}    # CRM service runs on 4002
  error:
    include-message: on-param      # Shows message when ?message param present; safe middle ground
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# ── Application-specific properties ──────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-token-expiry-ms: 900000        # 15 minutes (900s * 1000ms)
    refresh-token-expiry-ms: 604800000    # 7 days
  ingest:
    api-key: ${INGEST_API_KEY:change-me-in-production}
  cors:
    # To test the website from another device on your LAN (e.g. phone browser, tablet),
    # override CORS_ALLOWED_ORIGINS to also include your LAN URL, e.g.:
    #   CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3002,http://192.168.1.42:3000
    # Native mobile clients (flood-mobile-app) are not browser-CORS constrained.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}
  environment: ${NODE_ENV:development}
  email:
    from-address: ${EMAIL_FROM:noreply@yourdomain.com}
    resend-api-key: ${RESEND_API_KEY:}
    # Redirect all emails to this address in development (Resend test domain restriction)
    dev-recipient: ${DEV_EMAIL_RECIPIENT:}
  # ── Admin bootstrap ─────────────────────────────────────────────────────────
  # Set ADMIN_SEED_EMAIL + ADMIN_SEED_PASSWORD in the environment to automatically
  # create (or promote) an admin account on startup.  If either variable is empty
  # the seeding step is skipped entirely — no hardcoded credentials in source.
  admin:
    seed-email: ${ADMIN_SEED_EMAIL:}
    seed-password: ${ADMIN_SEED_PASSWORD:}
    seed-first-name: ${ADMIN_SEED_FIRST_NAME:Admin}
    seed-last-name: ${ADMIN_SEED_LAST_NAME:User}
